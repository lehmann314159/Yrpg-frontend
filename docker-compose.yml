services:
  frontend:
    image: lehmann314159/yrpg-frontend:latest
    container_name: yrpg-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - BACKEND_URL=http://yrpg-backend:8080
      - OLLAMA_BASE_URL=http://host-gateway:11434/v1
      - COMFYUI_URL=http://host-gateway:8188
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - web

  backend:
    image: lehmann314159/yrpg-backend:latest
    container_name: yrpg-backend
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/yrpg.db
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - yrpg-data:/data
    restart: unless-stopped
    networks:
      - web

volumes:
  yrpg-data:

networks:
  web:
    external: true
